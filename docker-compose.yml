services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB?Please set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER?Please set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Please set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER?Please set POSTGRES_USER in .env} -d ${POSTGRES_DB?Please set POSTGRES_DB in .env}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CODE_AGENT_RUN_API: 0
      CODE_AGENT_RUN_WORKER: 0
      CODE_AGENT_ENABLE_TASK_SERVICE: 1
      CODE_AGENT_API_SHARED_SECRET: ${CODE_AGENT_API_SHARED_SECRET?Please set CODE_AGENT_API_SHARED_SECRET in .env}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB?Please set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER?Please set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Please set POSTGRES_PASSWORD in .env}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CODE_AGENT_RUN_API: 1
      CODE_AGENT_RUN_WORKER: 0
      CODE_AGENT_ENABLE_TASK_SERVICE: 1
      CODE_AGENT_API_SHARED_SECRET: ${CODE_AGENT_API_SHARED_SECRET?Please set CODE_AGENT_API_SHARED_SECRET in .env}
      CODE_AGENT_TELEGRAM_BOT_TOKEN: ${CODE_AGENT_TELEGRAM_BOT_TOKEN:-}
      CODE_AGENT_TELEGRAM_WEBHOOK_SECRET_TOKEN: ${CODE_AGENT_TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
      CODE_AGENT_TELEGRAM_DEFAULT_REPO_URL: ${CODE_AGENT_TELEGRAM_DEFAULT_REPO_URL:-}
      CODE_AGENT_WEBHOOK_DEFAULT_REPO_URL: ${CODE_AGENT_WEBHOOK_DEFAULT_REPO_URL:-}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB?Please set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER?Please set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Please set POSTGRES_PASSWORD in .env}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      CODE_AGENT_RUN_API: 0
      CODE_AGENT_RUN_WORKER: 1
      CODE_AGENT_ENABLE_TASK_SERVICE: 1
      CODE_AGENT_API_SHARED_SECRET: ${CODE_AGENT_API_SHARED_SECRET?Please set CODE_AGENT_API_SHARED_SECRET in .env}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB?Please set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER?Please set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Please set POSTGRES_PASSWORD in .env}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${POSTGRES_DB}
      CODE_AGENT_TELEGRAM_BOT_TOKEN: ${CODE_AGENT_TELEGRAM_BOT_TOKEN:-}
      CODE_AGENT_TELEGRAM_DEFAULT_REPO_URL: ${CODE_AGENT_TELEGRAM_DEFAULT_REPO_URL:-}
      CODE_AGENT_CODEX_CLI_BIN: ${CODE_AGENT_CODEX_CLI_BIN:-codex}
      CODE_AGENT_CODEX_MODEL: ${CODE_AGENT_CODEX_MODEL:-gpt-5.4}
      CODE_AGENT_CODEX_SANDBOX: ${CODE_AGENT_CODEX_SANDBOX:-workspace-write}
      CODE_AGENT_GEMINI_CLI_BIN: ${CODE_AGENT_GEMINI_CLI_BIN:-gemini}
      CODE_AGENT_GEMINI_MODEL: ${CODE_AGENT_GEMINI_MODEL:-gemini-2.5-pro}
      GEMINI_HOME: /root/.gemini
      CODE_AGENT_SANDBOX_IMAGE: ${CODE_AGENT_SANDBOX_IMAGE:-code-agent-worker}
      CODE_AGENT_QUEUE_POLL_INTERVAL_SECONDS: ${CODE_AGENT_QUEUE_POLL_INTERVAL_SECONDS:-2}
      CODE_AGENT_QUEUE_LEASE_SECONDS: ${CODE_AGENT_QUEUE_LEASE_SECONDS:-60}
      CODE_AGENT_QUEUE_MAX_ATTEMPTS: ${CODE_AGENT_QUEUE_MAX_ATTEMPTS:-3}
      CODE_AGENT_WORKSPACE_ROOT: ${CODE_AGENT_WORKSPACE_ROOT:-/tmp/code-agent-workspaces}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CODE_AGENT_CODEX_AUTH_DIR?Please set CODE_AGENT_CODEX_AUTH_DIR in env}:/root/.codex
      - ${CODE_AGENT_GEMINI_AUTH_DIR?Please set CODE_AGENT_GEMINI_AUTH_DIR in env}:/root/.gemini
      - ${CODE_AGENT_WORKSPACE_ROOT:-/tmp/code-agent-workspaces}:${CODE_AGENT_WORKSPACE_ROOT:-/tmp/code-agent-workspaces}
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: http://api:8000
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    # Exposes api:8000 publicly over HTTPS.
    # Requires NGROK_AUTHTOKEN in .env (free at dashboard.ngrok.com → Your Authtoken).
    # Set NGROK_DOMAIN for a stable URL that never changes (free static domain
    # from dashboard.ngrok.com → Domains → New Domain).
    #
    # Query the current URL at any time:
    #   curl -s http://localhost:4040/api/tunnels
    #
    # Start: docker compose --profile tunnel up -d
    command: >
      http api:8000 --authtoken=${NGROK_AUTHTOKEN} ${NGROK_DOMAIN:+--url=${NGROK_DOMAIN}}

    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN?Please set NGROK_AUTHTOKEN in .env}
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    ports:
      - "4040:4040"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - tunnel
  init-webhook:
    image: alpine:latest
    restart: "no"
    depends_on:
      api:
        condition: service_healthy
      ngrok:
        condition: service_started
    profiles:
      - tunnel
    environment:
      CODE_AGENT_TELEGRAM_BOT_TOKEN: ${CODE_AGENT_TELEGRAM_BOT_TOKEN:-}
      CODE_AGENT_TELEGRAM_WEBHOOK_SECRET_TOKEN: ${CODE_AGENT_TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
    volumes:
      - ./scripts/init_webhook.sh:/init_webhook.sh:ro
    command: ["sh", "/init_webhook.sh"]
volumes:
  postgres_data:
