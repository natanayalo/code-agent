repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: debug-statements
      - id: check-added-large-files
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
        stages: [pre-commit]
  - repo: https://github.com/google/yamlfmt
    rev: v0.17.2
    hooks:
      - id: yamlfmt
        args: [--formatter, "indent=2"]
  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.28.0
    hooks:
      - id: check-jsonschema
        name: Validate GitHub Workflows
        files: ^\.github/workflows/.*\.ya?ml$
        args: [--schemafile, "https://json.schemastore.org/github-workflow.json"]
      - id: check-jsonschema
        name: Validate Pre-commit Config
        files: ^\.pre-commit-config\.yaml$
        args: [--schemafile, "https://json.schemastore.org/pre-commit-config.json"]
      - id: check-jsonschema
        name: Validate Docker Compose
        files: ^docker-compose\.ya?ml$
        args:
          - --schemafile
          - https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        args: [--redact]
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - alembic>=1.16,<2.0
          - fastapi>=0.116,<1.0
          - langgraph>=1.0,<2.0
          - openai>=2.0,<3.0
          - SQLAlchemy>=2.0,<3.0
          - uvicorn>=0.35,<1.0
          - cryptography>=44.0.0,<45.0
        files: ^(apps|db|memory|orchestrator|sandbox|tools|workers)/.*\.py$
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
