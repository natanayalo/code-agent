name: frozen-eval
on:
  push:
permissions:
  contents: read
concurrency:
  group: frozen-eval-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  frozen-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run frozen evaluation harness
        run: |
          python scripts/e2e/run_frozen_eval.py \
            --runner orchestrator \
            --output artifacts/evaluations/frozen-suite-report.json
      - name: Upload frozen evaluation report
        uses: actions/upload-artifact@v7
        with:
          name: frozen-suite-report
          path: artifacts/evaluations/frozen-suite-report.json
          if-no-files-found: error
