name: pytest
on:
  push:
permissions:
  contents: read
concurrency:
  group: pytest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Verify async pytest plugin availability
        run: poetry run python -c "import pytest_asyncio"
      - name: Run unit pytest with coverage gate
        run: |
          poetry run pytest tests/unit \
            --cov=apps \
            --cov=db \
            --cov=memory \
            --cov=orchestrator \
            --cov=repositories \
            --cov=sandbox \
            --cov=tools \
            --cov=workers \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Run integration pytest suite
        run: poetry run pytest tests/integration
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
