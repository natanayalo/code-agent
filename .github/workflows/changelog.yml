name: changelog
on:
  push:
    branches:
      - master
    paths-ignore:
      - CHANGELOG.md
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: changelog-update
  cancel-in-progress: true
jobs:
  update-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate changelog deploy key
        env:
          CHANGELOG_DEPLOY_KEY: ${{ secrets.CHANGELOG_DEPLOY_KEY }}
        run: |
          if [ -z "$CHANGELOG_DEPLOY_KEY" ]; then
            echo "CHANGELOG_DEPLOY_KEY secret is required for direct changelog pushes."
            exit 1
          fi
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master
          ssh-key: ${{ secrets.CHANGELOG_DEPLOY_KEY }}
          persist-credentials: true
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
      - name: Normalize changelog EOF
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("CHANGELOG.md")
          text = path.read_text(encoding="utf-8").rstrip("\n") + "\n"
          path.write_text(text, encoding="utf-8")
          PY
      - name: Verify only changelog changed
        run: |
          changed_files="$(git diff --name-only)"
          if [ -z "$changed_files" ]; then
            echo "CHANGELOG.md is already current."
            exit 0
          fi

          if [ -n "$changed_files" ] && [ "$changed_files" != "CHANGELOG.md" ]; then
            echo "Unexpected generated files:"
            git diff --name-only
            exit 1
          fi
      - name: Commit generated changelog
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update changelog [skip ci]"
          branch: master
          file_pattern: CHANGELOG.md
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
