name: changelog
on:
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: changelog-update
  cancel-in-progress: true
jobs:
  update-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
      - name: Open changelog pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_BRANCH: automation/update-changelog
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$CHANGELOG_BRANCH"
          git add CHANGELOG.md
          git commit -m "docs: update changelog"
          git push --force-with-lease origin "HEAD:$CHANGELOG_BRANCH"

          existing_pr="$(gh pr list --head "$CHANGELOG_BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "docs: update changelog" \
              --body "Generated from merged PR history with git-cliff."
          else
            gh pr create \
              --base master \
              --head "$CHANGELOG_BRANCH" \
              --title "docs: update changelog" \
              --body "Generated from merged PR history with git-cliff."
          fi
